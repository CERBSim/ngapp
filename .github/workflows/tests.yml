name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  packages: write

env:
  BASE_IMAGE: ghcr.io/cerbsim/ngapp-base
  WEBGPU_BASE_IMAGE: ghcr.io/cerbsim/webgpu-base

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ngapp base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tests/Dockerfile.base
          build-args: |
            BASE_IMAGE=${{ env.WEBGPU_BASE_IMAGE }}:latest
          tags: |
            ngapp-base
            ${{ env.BASE_IMAGE }}:latest
          load: true
          cache-from: |
            type=registry,ref=${{ env.BASE_IMAGE }}:latest
            type=gha,scope=ngapp-base
          cache-to: type=gha,mode=max,scope=ngapp-base

      - name: Push ngapp base image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push ${{ env.BASE_IMAGE }}:latest

      - name: Build test image
        run: docker build -f tests/Dockerfile --build-arg BASE_IMAGE=ngapp-base -t ngapp-tests .

      - name: Run tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/tests/output:/app/tests/output \
            ngapp-tests

      - name: Upload test output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: tests/output/